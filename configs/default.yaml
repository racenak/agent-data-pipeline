llm:
  model: openrouter:openai/gpt-4o
  temperature: 0.1
  max_tokens: 4096

pipeline:
  raw_dir: ./data/raw
  processed_dir: ./data/processed
  output_dir: ./data/output
  supported_input_formats:
    - csv
    - json
    - parquet
    - jsonl
  supported_output_formats:
    - csv
    - json
    - parquet
    - jsonl
  chunk_size: 100000
  max_file_size_mb: 500

memory:
  enabled: true
  dsn: "postgresql+asyncpg://agent:agent@localhost:5433/agent_memory"
  dsn_docker: "postgresql+asyncpg://agent:agent@agent-memory:5432/agent_memory"
  max_similar_incidents: 3
