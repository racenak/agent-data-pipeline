global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prefect
    static_configs:
      - targets: ['prefect-server:4200']
    metrics_path: '/api/metrics'
    scheme: 'http'

  - job_name: prefect-exporter
    static_configs:
      - targets: ['prefect-prometheus-exporter:8080']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
