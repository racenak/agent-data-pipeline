services:
  prometheus:
    image: prom/prometheus:v3
    volumes:
      - ./configs/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:3.7.2
    volumes:
      - loki_data:/loki
    command:
      - '-config.file=/etc/loki/local-config.yaml'
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.6.11
    depends_on:
      - loki
    volumes:
      - ./configs/monitoring/promtail-config.yml:/etc/promtail/config.yml:ro,Z
      - prefect_worker_logs:/var/log/app:ro,Z

  grafana:
    image: grafana/grafana:12.2
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./configs/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro,Z
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"

  grafana-mcp:
    image: grafana/mcp-grafana
    command:
      - -t
      - streamable-http
    ports:
      - "8000:8000"
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${GRAFANA_SERVICE_ACCOUNT_TOKEN}
    depends_on:
      - grafana

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
  clickhouse_data:
  prefect_worker_logs:
